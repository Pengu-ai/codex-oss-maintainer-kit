<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Codex for OSS応募前に、GitHubの証拠をそろえる</title>
  <desc id="desc">Codex for OSS申請準備を例に、GitHubの事実から応募材料を整理するCLIを紹介するX投稿用カード</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="48%" stop-color="#12313a"/>
      <stop offset="100%" stop-color="#14251f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <clipPath id="heroClip">
      <rect x="1012" y="42" width="496" height="816" rx="32"/>
    </clipPath>
    <style>
      .jp { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; letter-spacing: 0; }
      .pill { font-size: 25px; font-weight: 850; fill: #0f172a; }
      .eyebrow { font-size: 30px; font-weight: 800; fill: #9eead2; }
      .title { font-size: 82px; font-weight: 900; fill: #f8fafc; }
      .lead { font-size: 38px; font-weight: 750; fill: #c7f9e5; }
      .label { font-size: 25px; font-weight: 850; fill: #2563eb; }
      .body { font-size: 34px; font-weight: 850; fill: #0f172a; }
      .small { font-size: 27px; font-weight: 700; fill: #dbeafe; }
      .muted { fill: #94a3b8; }
      .tiny { font-size: 21px; font-weight: 700; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 716 C260 660 446 804 744 718 C1018 639 1180 638 1600 704 L1600 900 L0 900 Z" fill="#0f172a" opacity="0.55"/>
  <circle cx="1348" cy="154" r="220" fill="#38bdf8" opacity="0.08"/>
  <circle cx="194" cy="788" r="238" fill="#22c55e" opacity="0.08"/>

  <g transform="translate(92 58)">
    <rect x="0" y="0" width="276" height="56" rx="28" fill="#c7f9e5"/>
    <text x="138" y="38" text-anchor="middle" class="jp pill">例: Codex for OSS</text>
  </g>

  <g transform="translate(92 162)">
    <text class="jp eyebrow" x="0" y="0">応募文を書く前に</text>
    <text class="jp title" x="0" y="92">GitHubの証拠を</text>
    <text class="jp title" x="0" y="190">先にそろえる。</text>
    <text class="jp lead" x="4" y="252">スター数だけでは見えない</text>
    <text class="jp lead" x="4" y="300">保守の仕事を1枚に整理。</text>
  </g>

  <g transform="translate(92 522)" filter="url(#shadow)">
    <rect x="0" y="0" width="826" height="220" rx="22" fill="url(#panel)"/>
    <text x="40" y="60" class="jp label">このCLIが拾うもの</text>
    <text x="40" y="122" class="jp body">commit / release / issue</text>
    <text x="40" y="178" class="jp body">contributor / 足りない証拠TODO</text>
  </g>

  <g transform="translate(92 778)">
    <text class="jp small" x="0" y="0">盛らない。スター数に寄せない。最後は人が確認する。</text>
    <text class="jp tiny muted" x="0" y="44">github.com/Pengu-ai/codex-oss-maintainer-kit</text>
  </g>

  <g clip-path="url(#heroClip)">
    <image href="assets/pengulab-code-girl.png" x="1012" y="-26" width="496" height="868" preserveAspectRatio="xMidYMid slice"/>
    <rect x="1012" y="42" width="496" height="816" fill="#0f172a" opacity="0.16"/>
  </g>
  <rect x="1012" y="42" width="496" height="816" rx="32" fill="none" stroke="#7dd3fc" stroke-opacity="0.52" stroke-width="2"/>

  <g transform="translate(1046 704)" filter="url(#shadow)">
    <rect x="0" y="0" width="426" height="112" rx="20" fill="#0b1020" opacity="0.86"/>
    <text x="28" y="46" class="jp small">応募用の“材料集め”を</text>
    <text x="28" y="84" class="jp small">CLIに任せる例です。</text>
  </g>
</svg>
